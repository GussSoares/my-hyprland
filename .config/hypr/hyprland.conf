# #######################################################################################
# AUTOGENERATED HYPR CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hypr.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# autogenerated = 1 # remove this line to remove the warning

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor= eDP-1, 1920x1080@144.00301, 0x0, 1.00

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Statusbar
exec-once = waybar

# Notifications
exec-once = swaync

# Welcome message
exec-once = notify-send "Catppuccin" "Welcome back, $(echo $USER)" -i $HOME/.config/hypr/catppuccin.png -a "Hyprland" -n $HOME/.config/hypr/catppuccin.png

# Add networkmanager applet to tray in waybar
# exec-once = nm-applet --indicator

# wallpaper service
exec-once = awww-daemon

# Set keyboard layout
#exec-once = .local/bin/garuda-locale.sh

# Set monitor values. For own values, please comment with #
#exec-once = .local/bin/mon.sh

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default= true
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 10
    border_size = 2
    #col.active_border = rgba(33ccffee) rgba(8f00ffee) 45deg
    #col.inactive_border = rgba(595959aa)
    
    # Gradiente do Mauve para o Sapphire
    # col.active_border = rgba(cba6f7ee) rgba(74c7ecee) 45deg
    # col.inactive_border = rgba(313244aa)

    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    blur {
       enabled = true
       size = 10
       passes = 3
       new_optimizations = true    
}

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = master
}

misc {
    disable_hyprland_logo = true
    allow_session_lock_restore = true
}


# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# Example windowrule v1
#windowrule = float on, match:title (^(kitty)$)
#windowrule = float on, match:title (^(garuda-assistant)$)
#windowrule = float on, match:title (^(garuda-boot-options)$)
#windowrule = float on, match:title (^(garuda-boot-repair)$)
#windowrule = float on, match:title (^(garuda-gamer)$)
#windowrule = float on, match:title (^(garuda-network-assistant)$)
#windowrule = float on, match:title (^(garuda-settings-manager)$)
#windowrule = float on, match:title (^(garuda-welcome)$)
#windowrule = float on, match:title (^(calamares)$)

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$


# other blurings
#blurls = wofi
#blurls = thunar
#blurls = gedit
#blurls = gtk-layer-shell # for nwg-drawer
#blurls = catfish
# window rules
# windowrule v1 syntax is gone. windowrule now behaves like windowrulev2, deprecating the windowrulev2 keyword
#windowrule = opacity 0.85 override 0.85 override,title:(^(thunar)$)
#windowrule = opacity 0.85 override 0.85 override,title:(^(gedit)$)
#windowrule = opacity 0.85 override 0.85 override,title:(^(catfish)$)
#windowrule = stayfocused, title:(^(wofi)$)

# window rules with evaluation
#windowrulev2 = opacity 0.85 0.85,floating:1

exec-once =/usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# experimental(might work might won't)

# pre executions (under development)
exec-once=exec xrdb -load ~/.Xresources

# Clipboard Manager
exec-once = wl-paste --type text --watch cliphist store #Stores only text data
exec-once = wl-paste --type image --watch cliphist store #Stores only image data


# Use gtk-settings
exec-once = apply-gsettings

# Performance Tweaks (For less power consumption without sacrificing performance)
# See : https://wiki.hyprland.org/Configuring/Performance/
misc:vfr = true

# some env variables
env = XDG_CURRENT_DESKTOP,Hyprland
# we usually prefer things to be set up through script
# have a look at hyprstart file

source = ~/.config/hypr/my-settings.conf
source = ~/.config/hypr/keybinding.conf
source = ~/.config/hypr/theme.conf
