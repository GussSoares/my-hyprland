
# Keybindings

bindm = $mainMod+Shift, mouse:272, resizewindow


debug {
    disable_logs=false
}

# inputs

input {
    kb_layout = br,us
    kb_variant = abnt2,intl
    kb_options = grp:alt_space_toggle
    kb_model =
    kb_rules =
    numlock_by_default= true
    follow_mouse = 1

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

misc {
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

cursor {
    no_hardware_cursors = 1
    use_cpu_buffer = 1
    zoom_factor = 0
    zoom_rigid = 0
}

# workspaces
# workspace = 1, monitor:HDMI-A-1, default:true
# workspace = 2, monitor:HDMI-A-1
# workspace = 3, monitor:HDMI-A-1

# workspace = 5, monitor:eDP-1, default:true
# workspace = 6, monitor:eDP-1
# workspace = 7, monitor:eDP-1

# workspace = 8, monitor:DP-1, default:true
# workspace = 9, monitor:DP-1
# workspace = 10, monitor:DP-1
###########
## RULES ##
###########

windowrule = match:class .*-floating$, float on, size 800 800, center on
windowrule = match:class update-floating, float on, size 800 600, center on
windowrule = match:class bluetui-floating, float on, size 800 600, center on
windowrule = match:class files-floating, float on, size 800 600, center on

# binds
bind = SUPER, Space, togglefloating
bind = SUPER, Space, resizeactive, exact 50% 50%
bind = SUPER, Space, centerwindow
bind = SUPER ALT, L, exec, hyprlock -q
bind = SUPER, E, exec, kitty --class files-floating -e spf
bind = Control_L&Alt_L, Delete, exec, ~/bin/wofi-power-menu.sh

exec-once = nwg-dock-hyprland -d -mb 10

# gesture {} deprecated, use like above
gesture = 3, horizontal, workspace

monitor= eDP-1, 1920x1080@144.00301, 0x0, 1.00
monitor= HDMI-A-1, 1920x1080@144.00, 1920x0, 1.00
#monitor= DP-1, preferred, auto, 1, transform, 3
#monitor= eDP-1,disable

#monitor= eDP-1,preferred, 0x0, 1.00
#monitor=HDMI-A-1,preferred, 1920x0,1
monitor=DP-1,preferred,auto,1,transform,3

opengl {
    nvidia_anti_flicker = false
}

## Ajustes de monitores quando sessão começa
#exec-once = hyprctl keyword monitor "eDP-1, 1920x1080@144.00301, 0x0, 1"   # Tela do notebook
## Se monitor HDMI estiver conectado
#exec-once = hyprctl keyword monitor "HDMI-A-1, 1920x1080@144.00, 1920x0, 1.00"
## Se monitor DP vertical estiver conectado
#exec-once = hyprctl keyword monitor "DP-1, preferred, auto, 1, transform, 3"

## Wallpapers
#exec-once = hyprpaper
#exec-once = ~/.config/hypr/scripts/wallpaper-slide.sh

#################################
# change aq_drm_device variable #
#################################
#exec-once = ~/bin/hyprland-force-nvidia.sh
#exec-shutdown = ~/bin/hyprland-force-intel.sh


env = WLR_NO_HARDWARE_CURSORS,1
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = WLR_RENDERER_ALLOW_SOFTWARE,0
# env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2
env = AQ_RENDERER_ALLOW_SOFTWARE,0
env = AQ_FORCE_LINEAR_BLIT,0
#env = WLR_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
#env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0


#env = __NV_PRIME_RENDER_OFFLOAD,1
#env = __VK_LAYER_NV_optimus,NVIDIA_only

#env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2
#env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1:/dev/dri/card2
#env = WLR_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1:/dev/dri/card2


# Start target session for wpaperd.service and hypridle.service
#exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP && systemctl --user start hyprland-session.target

# set cursor
exec-once = hyprctl setcursor Twilight-cursors 24

# monitors
source = ~/.config/hypr/monitors.conf
