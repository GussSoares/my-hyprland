format = """\
[Ôò¡Ôò┤](fg:arrow)\
$username\
$os\
$git_branch\
$git_status\
(\
    at \
    $directory\
)\
$fill $cmd_duration $time\
(\
    via \
    $python\
    $conda\
    $nodejs\
    $c\
    $rust\
    $java\
)
[Ôò░ÔöÇ](fg:arrow)$character\
"""
# Add the modules you need

# Disable the blank line at the start of the prompt
add_newline = true

palette = "normal"

[palettes.normal]
arrow = "#B3BCFD"
os = "#B3BCFD"
os_admin = "#B3BCFD"
directory = "#B3BCFD"
time = "#B3BCFD"
node = "#a5e6ba"
git = "#f17f29"
git_status = "#DFEBED"
python = "#edf67d"
conda = "#70e000"
java = "#F86279"
rust = "#ffdac6"
clang = "#caf0f8"
duration = "#ce4257"
text_color = "#EDF2F4"
text_light = "#26272A"

[username]
style_user = 'bold os'
style_root = 'bold os_admin'
format = '[´îâ  $user](fg:$style) '
disabled = false
show_always = true

[os]
format = "on [($name)]($style) "
style = "bold blue"
disabled = true

[os.symbols]
Alpine = "´îÇ "
Arch = "´îâ "
Debian = "´îå "
EndeavourOS = "´åù "
Fedora = "´îè "
Linux = "´îÜ "
Macos = "´îé "
Manjaro = "´îÆ "
Mint = "´îÄ "
NixOS = "´îô "
openSUSE = "´îö "
Pop = "¯èú "
SUSE = "´îö "
Ubuntu = "´îø "
Windows = "´à║ "

[character]
success_symbol = "[¾░ìƒ](fg:arrow)"
error_symbol = "[¾░ìƒ](fg:red)"

[directory]
format = "[$path](bold $style)[$read_only]($read_only_style) "
truncation_length = 2
style = "fg:directory"
read_only_style = "fg:directory"
before_repo_root_style = "fg:directory"
truncation_symbol = "ÔÇª/"
truncate_to_repo = true
read_only =" ¯®Á "

[time]
disabled = false
format = "[¾▒æê $time]($style)"
time_format = "%H:%M"
style = "bold fg:time"



[cmd_duration]
disabled = false
format = "took [´ôú $duration]($style) "
style = "bold fg:duration"
min_time = 500

[git_branch]
format = "via [$symbol$branch]($style) "
style = "bold fg:git"
symbol = "¯£é "

#[git_status]
#format = '[ $all_status$ahead_behind ]($style)'
#style = "fg:text_color bg:git"
#disabled = true

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "fg:git"
disabled = false

# ├ìcones Nerd Font para cada status
stashed = "¯«û "         # Stash (nf-md-source_branch_sync)
ahead = "¯¬í${count} "    # Ahead (nf-md-arrow_up_bold)
behind = "¯¬Ü${count} "   # Behind (nf-md-arrow_down_bold)
diverged = "¯«┤Ôçà${count} "       # Diverged (nf-md-source_branch_remove + arrows)
conflicted = "¯£º${count} "       # Conflict (nf-dev-git_merge)
deleted = "¯½ƒ ${count} "          # Deleted (nf-md-delete)
modified = "´ô╣ ${count} "         # Modified (nf-md-file_document_edit)
renamed = "¾░æò ${count} "          # Renamed (nf-md-file_replace_outline)
staged = "´üå ${count} "           # Staged (nf-fa-check_square)
untracked = "¯®┐ ${count} "        # Untracked (nf-md-file_question)
#ignored = "¯«Á "          # Ignored (nf-md-eye_off)
#add = "´üò ${count} "            # Added (nf-fa-plus_square)

[docker_context]
disabled=false
symbol = "´îê "

[package]
disabled=false

[fill]
symbol = " "

[nodejs]
format = "[ $symbol$version ]($style)"
style = "bg:node fg:text_light"
symbol = "¯£ÿ "
version_format = "${raw}"
disabled=false

[python]
disabled=false
format = '[ ${symbol}${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = "¯ÿå "
version_format = "${raw}"
style = "bg:python fg:text_light"

[conda]
format = "[ $symbol$environment ]($style)"
style = "bg:conda fg:text_light"
ignore_base = false
disabled = false
symbol = "´äî "

[java]
format = "[ $symbol$version ]($style)"
style = "bg:java fg:text_light"
version_format = "${raw}"
symbol = "¯Ö¡ "
disabled = false

[c]
format = "[ $symbol($version(-$name)) ]($style)"
style = "bg:clang fg:text_light"
symbol = "¯ÿ× "
version_format = "${raw}"
disabled=false

[rust]
format ="[ $symbol$version ]($style)"
style = "bg:rust fg:text_light"
